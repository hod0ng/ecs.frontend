<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SmileShark Team 검색</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; }
        h1 { margin-bottom: 8px; color: #3b82f6; }
        p { color: #888; margin-bottom: 24px; font-size: 0.9rem; }
        .search-box { display: flex; gap: 8px; margin-bottom: 20px; }
        input { flex: 1; padding: 10px; font-size: 1rem; border: 1px solid #ccc; border-radius: 6px; }
        button { padding: 10px 20px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #2563eb; }
        .error { color: red; margin-top: 12px; }
        .empty { color: #888; margin-top: 12px; }
        .item { padding: 12px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 8px; }
        .item strong { display: block; margin-bottom: 4px; }
        .item span { color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>
<h1>SmileShark People</h1>
<p>2주차 Project</p>
<div class="search-box">
    <input id="query" type="text" placeholder="임직원 이름을 검색해주세요."
        onkeydown="if(event.key==='Enter') search()">
    <button onclick="search()">검색</button>
</div>
<div id="result"></div>
<script>
async function search() {
    const q = document.getElementById('query').value.trim();
    const result = document.getElementById('result');
    if (!q) {
        result.innerHTML = '<p class="empty">이름을 입력해주세요.</p>';
        return;
    }
    result.innerHTML = '<p class="empty">검색 중...</p>';
    try {
        const res = await fetch('/api/items?q=' + encodeURIComponent(q));
        if (!res.ok) throw new Error('서버 오류 (' + res.status + ')');
        const items = await res.json();
        if (items.length === 0) {
            result.innerHTML = '<p class="empty">SmileShark 임직원이 아닙니다.</p>';
            return;
        }
        result.innerHTML = items.map(item =>
            '<div class="item"><strong>' + item.name + '</strong><span>' + item.description + '</span></div>'
        ).join('');
    } catch (e) {
        result.innerHTML = '<p class="error">❌ 오류: ' + e.message + '</p>';
    }
}
</script>
</body>
</html>
